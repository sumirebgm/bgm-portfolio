<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather BGM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a96e;--goldf:rgba(200,169,110,0.32);--text:#e8e0d0;--dim:rgba(232,224,208,0.42);--bdr:rgba(200,180,140,0.14)}
html,body{width:100%;height:100%;font-family:'Noto Serif JP',serif;color:var(--text);overflow:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.55}
.bg{position:fixed;inset:0;transition:opacity 0.05s linear}
.bg-rain{background:linear-gradient(180deg,#060c18 0%,#0c1628 18%,#101e38 36%,#162540 54%,#101c30 72%,#080e1c 100%)}
.bg-snow{background:linear-gradient(180deg,#c8e4f8 0%,#a8d4f0 15%,#88c4e8 32%,#6ab4e0 50%,#4898c8 68%,#2878a8 84%,#0a1820 100%);opacity:0}
.rain-layer{position:fixed;inset:0;pointer-events:none;z-index:2;transition:opacity 0.05s linear}
.rd{position:absolute;width:2px;border-radius:1px;background:linear-gradient(180deg,transparent,rgba(150,190,230,0.55));animation:rf linear infinite}
@keyframes rf{from{transform:translateY(-30px)}to{transform:translateY(110vh)}}
.snow-layer{position:fixed;inset:0;pointer-events:none;z-index:2;opacity:0;transition:opacity 0.05s linear}
.sf{position:absolute;top:-10px;border-radius:50%;background:rgba(220,235,255,0.75);animation:sf linear infinite}
@keyframes sf{from{transform:translateY(0) translateX(0);opacity:0.8}to{transform:translateY(110vh) translateX(20px);opacity:0}}
.page{position:relative;z-index:10;width:100%;height:100vh;display:grid;grid-template-columns:1fr 340px}
.left{display:flex;flex-direction:column;justify-content:flex-end;padding:56px 64px}
.weather-titles{display:flex;align-items:baseline;justify-content:space-between;max-width:580px;margin-bottom:8px}
.wtitle{transition:opacity 0.05s linear}
.wtitle-jp{font-size:52px;font-weight:300;letter-spacing:0.1em;line-height:1;text-shadow:0 2px 30px rgba(0,0,0,0.7);display:block}
.wtitle-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;letter-spacing:0.28em;display:block;margin-top:6px;text-shadow:0 1px 10px rgba(0,0,0,0.7)}
.wtitle-rain{opacity:1}
.wtitle-snow{opacity:0.25}
.slider-area{margin-top:44px;max-width:580px}
.slider-ends{display:flex;justify-content:space-between;margin-bottom:14px}
.slider-end-label{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.38em;text-transform:uppercase}
.sel-rain{color:rgba(120,170,220,0.75)}
.sel-snow{color:rgba(180,215,255,0.75)}
.wx-slider{-webkit-appearance:none;appearance:none;width:100%;height:1px;outline:none;cursor:pointer;background:linear-gradient(90deg,rgba(100,150,210,0.5) 0%,rgba(180,215,255,0.5) 100%)}
.wx-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--text);border:1px solid rgba(200,180,140,0.45);box-shadow:0 0 14px rgba(160,205,255,0.45);cursor:pointer;transition:box-shadow 0.2s}
.wx-slider::-webkit-slider-thumb:hover{box-shadow:0 0 24px rgba(160,205,255,0.75)}
.slider-hint{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.3em;color:rgba(232,224,208,0.2);text-align:center;margin-top:12px}
.play-btn{display:inline-flex;align-items:center;gap:14px;border:1px solid var(--goldf);padding:13px 26px;cursor:pointer;background:transparent;color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.42em;text-transform:uppercase;margin-top:36px;transition:background 0.25s,color 0.25s}
.play-btn:hover{background:var(--goldf);color:var(--text)}
.play-circle{width:28px;height:28px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px}
.right{border-left:1px solid var(--bdr);background:rgba(6,10,20,0.6);backdrop-filter:blur(20px);display:flex;flex-direction:column;padding:48px 36px}
.rp-eyebrow{font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:0.5em;color:rgba(200,169,110,0.38);text-transform:uppercase;margin-bottom:36px}
.rp-now{flex:1;display:flex;flex-direction:column;justify-content:center}
.rp-title-jp{font-size:32px;font-weight:300;letter-spacing:0.1em;line-height:1.2;margin-bottom:6px}
.rp-title-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;letter-spacing:0.22em;color:var(--dim);margin-bottom:24px}
.rp-wave{display:flex;align-items:center;gap:3px;height:32px;margin-bottom:32px}
.wb{width:3px;border-radius:2px;background:var(--goldf)}
.rp-wave.on .wb{background:var(--gold);animation:wv 0.75s ease-in-out infinite alternate}
.rp-wave.on .wb:nth-child(1){animation-delay:0.00s;--h:10px}
.rp-wave.on .wb:nth-child(2){animation-delay:0.08s;--h:20px}
.rp-wave.on .wb:nth-child(3){animation-delay:0.16s;--h:14px}
.rp-wave.on .wb:nth-child(4){animation-delay:0.04s;--h:26px}
.rp-wave.on .wb:nth-child(5){animation-delay:0.12s;--h:16px}
.rp-wave.on .wb:nth-child(6){animation-delay:0.20s;--h:22px}
.rp-wave.on .wb:nth-child(7){animation-delay:0.02s;--h:12px}
.rp-wave.on .wb:nth-child(8){animation-delay:0.10s;--h:18px}
.rp-wave.on .wb:nth-child(9){animation-delay:0.18s;--h:8px}
.rp-wave.on .wb:nth-child(10){animation-delay:0.06s;--h:24px}
@keyframes wv{from{height:3px}to{height:var(--h,12px)}}
.rp-play{display:inline-flex;align-items:center;gap:14px;border:1px solid var(--goldf);padding:13px 22px;cursor:pointer;background:transparent;color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:0.42em;text-transform:uppercase;width:fit-content;transition:background 0.25s,color 0.25s}
.rp-play:hover{background:var(--goldf);color:var(--text)}
@media(max-width:768px){
  html,body{overflow:auto}
  .page{grid-template-columns:1fr;height:auto;min-height:100vh}
  .right{display:none}
  .left{padding:48px 28px 56px;min-height:100vh;justify-content:flex-end}
  .wtitle-jp{font-size:36px}
  .wtitle-en{font-size:13px}
  .weather-titles{max-width:100%}
  .slider-area{max-width:100%}
  .play-btn{width:100%;justify-content:center}
}
</style>
</head>
<body>
<div class="bg bg-rain" id="bg-rain"></div>
<div class="bg bg-snow" id="bg-snow"></div>
<div class="rain-layer" id="rain-layer"></div>
<div class="snow-layer" id="snow-layer"></div>
<div class="page">
  <div class="left">
    <div class="weather-titles">
      <div class="wtitle wtitle-rain" id="wt-rain">
        <span class="wtitle-jp">雨の日</span>
        <span class="wtitle-en">Rainy Day</span>
      </div>
      <div class="wtitle wtitle-snow" id="wt-snow" style="text-align:right">
        <span class="wtitle-jp">雪の日</span>
        <span class="wtitle-en">Snowy Day</span>
      </div>
    </div>
    <div class="slider-area">
      <div class="slider-ends">
        <span class="slider-end-label sel-rain">雨 / Rain</span>
        <span class="slider-end-label sel-snow">雪 / Snow</span>
      </div>
      <input type="range" class="wx-slider" id="wx-slider" min="0" max="100" value="0" oninput="onSlide(this.value)">
      <div class="slider-hint">← スライドで音とシーンが変わります / Slide to crossfade →</div>
    </div>
    <button class="play-btn" id="play-btn" onclick="togglePlay()">
      <div class="play-circle" id="play-icon">▶</div>
      <span id="play-label">再生 / Play</span>
    </button>
  </div>
  <div class="right">
    <div class="rp-eyebrow">BGM Portfolio</div>
    <div class="rp-now">
      <div class="rp-title-jp" id="rp-jp">雨の日</div>
      <div class="rp-title-en" id="rp-en">Rainy Day</div>
      <div class="rp-wave" id="rp-wave">
        <div class="wb" style="height:4px"></div><div class="wb" style="height:4px"></div>
        <div class="wb" style="height:4px"></div><div class="wb" style="height:4px"></div>
        <div class="wb" style="height:4px"></div><div class="wb" style="height:4px"></div>
        <div class="wb" style="height:4px"></div><div class="wb" style="height:4px"></div>
        <div class="wb" style="height:4px"></div><div class="wb" style="height:4px"></div>
      </div>
      <button class="rp-play" onclick="togglePlay()">
        <div class="play-circle" id="rp-play-icon">▶</div>
        <span id="rp-play-label">再生 / Play</span>
      </button>
    </div>
  </div>
</div>
<script>
let audioCtx=null,sources={},gains={},audioLoaded=false,audioPlaying=false;

(function(){
  const c=document.getElementById('rain-layer');
  for(let i=0;i<65;i++){
    const d=document.createElement('div');d.className='rd';
    const h=Math.random()*80+40;
    d.style.cssText=`left:${Math.random()*100}%;height:${h}px;animation-duration:${(Math.random()*0.5+0.55).toFixed(2)}s;animation-delay:${(Math.random()*2).toFixed(2)}s;opacity:${(Math.random()*0.35+0.1).toFixed(2)};top:${Math.random()*100}%`;
    c.appendChild(d);
  }
})();

(function(){
  const c=document.getElementById('snow-layer');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='sf';
    const sz=Math.random()*3+1.5;
    s.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-duration:${(Math.random()*4+4).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s;opacity:${(Math.random()*0.5+0.3).toFixed(2)}`;
    c.appendChild(s);
  }
})();

async function loadAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  for(const[name,file]of[['bass','bass.wav'],['rain','rain.wav'],['snow','snow.wav']]){
    const resp=await fetch(file);
    const buf=await resp.arrayBuffer();
    const decoded=await audioCtx.decodeAudioData(buf);
    const src=audioCtx.createBufferSource();
    src.buffer=decoded;src.loop=true;
    const gain=audioCtx.createGain();
    gain.gain.value=name==='bass'?1.0:(name==='rain'?1.0:0.0);
    src.connect(gain);gain.connect(audioCtx.destination);
    sources[name]=src;gains[name]=gain;
  }
  audioLoaded=true;
}

async function togglePlay(){
  const icons=['play-icon','rp-play-icon'];
  const labels=['play-label','rp-play-label'];
  if(!audioLoaded){
    icons.forEach(id=>document.getElementById(id).textContent='…');
    labels.forEach(id=>document.getElementById(id).textContent='読み込み中...');
    await loadAudio();
    const t=parseInt(document.getElementById('wx-slider').value)/100;
    Object.values(sources).forEach(s=>s.start(audioCtx.currentTime+0.05));
    applyGains(t);audioPlaying=true;
  }else if(audioPlaying){
    audioCtx.suspend();audioPlaying=false;
  }else{
    audioCtx.resume();audioPlaying=true;
  }
  icons.forEach(id=>document.getElementById(id).textContent=audioPlaying?'⏸':'▶');
  labels.forEach(id=>document.getElementById(id).textContent=audioPlaying?'停止 / Stop':'再生 / Play');
  document.getElementById('rp-wave').classList.toggle('on',audioPlaying);
}

function applyGains(t){
  if(gains['rain'])gains['rain'].gain.value=1-t;
  if(gains['snow'])gains['snow'].gain.value=t;
}

function onSlide(val){
  const t=parseInt(val)/100;
  document.getElementById('bg-rain').style.opacity=1-t;
  document.getElementById('bg-snow').style.opacity=t;
  document.getElementById('rain-layer').style.opacity=1-t;
  document.getElementById('snow-layer').style.opacity=t;
  document.getElementById('wt-rain').style.opacity=Math.max(0.22,1-t*1.4);
  document.getElementById('wt-snow').style.opacity=Math.max(0.22,t*1.4);
  document.getElementById('rp-jp').textContent=t<0.5?'雨の日':'雪の日';
  document.getElementById('rp-en').textContent=t<0.5?'Rainy Day':'Snowy Day';
  applyGains(t);
}
</script>
</body>
</html>
